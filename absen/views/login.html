<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Sistem Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #4F8EF7;
      --purple: #7C5CFC;
      --grad: linear-gradient(135deg, #4F8EF7 0%, #7C5CFC 100%);
      --white: #ffffff;
      --gray: #6b7280;
      --border: #e5e7eb;
      --dark: #111827;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grad);
      padding: 20px;
    }
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,.2);
      animation: up .4s ease;
    }
    @keyframes up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .logo {
      width: 68px; height: 68px;
      background: var(--grad);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 30px;
    }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 800; color: var(--dark); }
    .sub { text-align: center; color: var(--gray); font-size: .9rem; margin-top: 6px; margin-bottom: 28px; }

    /* TABS */
    .tabs { display: flex; background: #f3f4f6; border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 10px; border: none; background: transparent;
      border-radius: 9px; font-family: inherit; font-size: .88rem;
      font-weight: 600; color: var(--gray); cursor: pointer; transition: .2s;
    }
    .tab.active { background: var(--white); color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    label {
      display: block; font-size: .82rem; font-weight: 600;
      color: #374151; margin-bottom: 6px; margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }

    .iw { position: relative; }
    .iw i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); font-size: 16px;
      color: #9ca3af; pointer-events: none;
    }
    input {
      width: 100%; padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-family: inherit; font-size: .9rem; color: var(--dark);
      background: var(--white); outline: none; transition: .2s;
    }
    input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,92,252,.12); }

    .btn {
      width: 100%; margin-top: 22px; padding: 14px;
      background: var(--grad); color: #fff; border: none;
      border-radius: 12px; font-family: inherit; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .92; }
    .btn:active { transform: scale(.98); }

    .note { text-align: center; color: var(--gray); font-size: .78rem; margin-top: 14px; }

    /* ALERT */
    .alert {
      padding: 10px 14px; border-radius: 10px;
      font-size: .85rem; font-weight: 500; margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; }
    .alert-danger { background: #fee2e2; color: #b91c1c; }

    .help {
      position: fixed; bottom: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; color: var(--purple);
      border: 2px solid var(--purple);
      font-weight: 800; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">📚</div>
  <h1>Student Attendance</h1>
  <p class="sub">Welcome back! Please login to continue</p>

  <div class="alert alert-danger" id="alert"></div>

  <!-- Tab Switch -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('siswa',this)">👨‍🎓 Siswa</button>
    <button class="tab" onclick="switchTab('admin',this)">🔐 Admin</button>
  </div>

  <!-- Panel Siswa -->
  <div class="panel active" id="panel-siswa">
    <form method="POST" action="/login">
      <input type="hidden" name="role" value="siswa"/>

      <label>Nama Lengkap</label>
      <div class="iw">
        <i>👤</i>
        <input type="text" name="nama" placeholder="Masukkan nama lengkap" required/>
      </div>

      <label>Kelas</label>
      <div class="iw">
        <i>🏫</i>
        <input type="text" name="kelas" placeholder="Contoh: X PPLG 1" required/>
      </div>

      <label>Nomor Absen</label>
      <div class="iw">
        <i>#</i>
        <input type="text" name="no_absen" placeholder="Contoh: 001" required/>
      </div>

      <button type="submit" class="btn">Login sebagai Siswa</button>
    </form>
    <p class="note">Data divalidasi dari daftar siswa yang terdaftar</p>
  </div>

  <!-- Panel Admin -->
  <div class="panel" id="panel-admin">
    <form method="POST" action="/login">
      <input type="hidden" name="role" value="admin"/>

      <label>Username</label>
      <div class="iw">
        <i>👤</i>
        <input type="text" name="username" placeholder="Masukkan username" required/>
      </div>

      <label>Password</label>
      <div class="iw">
        <i>🔒</i>
        <input type="password" name="password" placeholder="Masukkan password" required/>
      </div>

      <button type="submit" class="btn">Login sebagai Admin</button>
    </form>
    <p class="note">Demo: <strong>admin</strong> / admin123 &nbsp;|&nbsp; <strong>guru</strong> / guru123</p>
  </div>
</div>

<button class="help">?</button>

<script>
  function switchTab(role, btn) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + role).classList.add('active');
  }

  // Tampilkan error dari session
  fetch('/api/flash').then(r => r.json()).then(d => {
    if (d.error) {
      const el = document.getElementById('alert');
      el.textContent = d.error;
      el.classList.add('show');
    }
  });
</script>
</body>
</html>
