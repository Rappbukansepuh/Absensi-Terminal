<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Admin — Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --blue:#4F8EF7; --purple:#7C5CFC;
      --grad:linear-gradient(135deg,#4F8EF7,#7C5CFC);
      --bg:#f0f2f8; --white:#fff; --border:#e5e7eb;
      --gray:#6b7280; --dark:#111827;
    }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); min-height:100vh; }

    /* NAVBAR */
    nav {
      background:var(--white); border-bottom:1px solid var(--border);
      padding:0 24px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:10;
    }
    .brand { display:flex; align-items:center; gap:10px; font-weight:800; color:var(--dark); }
    .brand-icon { width:36px;height:36px; background:var(--grad); border-radius:10px; display:flex;align-items:center;justify-content:center; font-size:18px; }
    .logout-btn {
      padding:8px 18px; background:#ef4444; color:#fff; border:none;
      border-radius:10px; font-family:inherit; font-size:.85rem; font-weight:700;
      cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:6px;
    }
    .logout-btn:hover { background:#dc2626; }

    main { max-width:1100px; margin:0 auto; padding:28px 20px; }

    /* DATE BAR */
    .date-bar {
      background:var(--white); border-radius:14px; padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      font-weight:600; color:var(--dark); margin-bottom:24px;
      border:1px solid var(--border); flex-wrap:wrap; gap:10px;
    }
    .admin-badge { color:var(--purple); font-size:.9rem; }

    /* STATS */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
    @media(max-width:600px){ .stats{ grid-template-columns:1fr 1fr; } }

    .stat {
      background:var(--white); border-radius:16px;
      padding:20px; border:1px solid var(--border);
    }
    .stat .label { font-size:.8rem; color:var(--gray); font-weight:600; margin-bottom:6px; }
    .stat .value { font-size:2.2rem; font-weight:800; color:var(--dark); }
    .stat .value.grad {
      background:var(--grad);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* CARD */
    .card { background:var(--white); border-radius:18px; padding:24px; border:1px solid var(--border); margin-bottom:20px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .card-head h2 { font-size:1.1rem; font-weight:800; color:var(--dark); }

    /* RIWAYAT TANGGAL */
    .tanggal-list { display:flex; flex-wrap:wrap; gap:8px; }
    .tgl-btn {
      padding:6px 14px; border:1.5px solid var(--border);
      border-radius:8px; background:var(--white);
      font-family:inherit; font-size:.8rem; font-weight:600;
      color:var(--gray); cursor:pointer; text-decoration:none;
      transition:.15s;
    }
    .tgl-btn:hover, .tgl-btn.active {
      background:var(--grad); color:#fff; border-color:transparent;
    }

    /* TABLE */
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:500px; }
    th {
      text-align:left; padding:10px 14px;
      font-size:.78rem; font-weight:700; color:var(--gray);
      border-bottom:2px solid var(--border);
    }
    td {
      padding:12px 14px; font-size:.85rem;
      color:var(--dark); border-bottom:1px solid var(--border);
    }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bg); }

    .kelas-badge {
      padding:3px 10px; background:rgba(79,142,247,.1);
      color:var(--blue); border-radius:6px; font-weight:700; font-size:.78rem;
    }
    .time-pill {
      padding:3px 10px; background:var(--grad);
      color:#fff; border-radius:6px; font-size:.78rem; font-weight:700;
    }

    /* EMPTY */
    .empty { text-align:center; padding:40px; color:var(--gray); }
    .empty .big { font-size:48px; margin-bottom:10px; opacity:.3; }

    /* SEARCH */
    .search-wrap { position:relative; }
    .search-wrap input {
      width:220px; padding:8px 12px 8px 36px;
      border:1.5px solid var(--border); border-radius:10px;
      font-family:inherit; font-size:.85rem; outline:none;
      transition:.2s;
    }
    .search-wrap input:focus { border-color:var(--purple); }
    .search-wrap span { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--gray); }

    .refresh-btn {
      padding:8px 16px; background:var(--bg); border:1.5px solid var(--border);
      border-radius:10px; font-family:inherit; font-size:.85rem; font-weight:600;
      color:var(--dark); cursor:pointer; transition:.15s;
    }
    .refresh-btn:hover { background:var(--border); }

    .help { position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:#fff;color:var(--purple);border:2px solid var(--purple);font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center; }
  </style>
</head>
<body>

<nav>
  <div class="brand">
    <div class="brand-icon">🏫</div>
    Attendance System
  </div>
  <a href="/logout" class="logout-btn">⬅ Logout</a>
</nav>

<main>
  <!-- Date Bar -->
  <div class="date-bar">
    <span>📅 &nbsp;<span id="hari-ini">Memuat...</span></span>
    <span class="admin-badge">👤 Admin: <strong id="nama-admin">—</strong></span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="label">Hadir Hari Ini</div>
      <div class="value grad" id="total-hadir">—</div>
    </div>
    <div class="stat">
      <div class="label">Total Siswa</div>
      <div class="value" id="total-siswa">—</div>
    </div>
    <div class="stat">
      <div class="label">Persentase Hadir</div>
      <div class="value grad" id="persen">—</div>
    </div>
  </div>

  <!-- Riwayat Tanggal -->
  <div class="card" id="card-riwayat" style="display:none;">
    <div class="card-head">
      <h2>📂 Riwayat Absensi</h2>
    </div>
    <div class="tanggal-list" id="tanggal-list"></div>
  </div>

  <!-- Tabel Absensi -->
  <div class="card">
    <div class="card-head">
      <h2>📋 Absensi Hari Ini (<span id="jumlah-tampil">0</span> siswa)</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="search-wrap">
          <span>🔍</span>
          <input type="text" id="search" placeholder="Cari nama..." oninput="filterTabel()"/>
        </div>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>No. Absen</th>
            <th>Waktu</th>
          </tr>
        </thead>
        <tbody id="tabel-body">
          <tr><td colspan="5"><div class="empty"><div class="big">📭</div><p>Memuat data...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<button class="help">?</button>

<script>
  let semuaRekap = [];

  async function loadData(tanggal = null) {
    let url = '/api/admin-data';
    const res  = await fetch(url);
    const data = await res.json();

    // Update header
    document.getElementById('hari-ini').textContent   = data.hariIni;
    document.getElementById('nama-admin').textContent = data.admin;

    // Update stats
    document.getElementById('total-hadir').textContent = data.totalHadir;
    document.getElementById('total-siswa').textContent  = data.totalSiswa;
    const persen = data.totalSiswa > 0
      ? Math.round((data.totalHadir / data.totalSiswa) * 100) + '%'
      : '0%';
    document.getElementById('persen').textContent = persen;

    // Update riwayat tanggal
    if (data.semuaTanggal.length > 0) {
      document.getElementById('card-riwayat').style.display = 'block';
      document.getElementById('tanggal-list').innerHTML = data.semuaTanggal.map(tgl => `
        <button class="tgl-btn" onclick="loadTanggal('${tgl}', this)">${tgl}</button>
      `).join('');
    }

    semuaRekap = data.rekap;
    renderTabel(semuaRekap);
  }

  async function loadTanggal(tanggal, btn) {
    // Update active button
    document.querySelectorAll('.tgl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const res  = await fetch(`/api/absensi/${tanggal}`);
    const data = await res.json();
    semuaRekap = data.rekap;
    renderTabel(semuaRekap);

    // Update judul
    document.querySelector('.card-head h2').innerHTML =
      `📋 Absensi ${tanggal} (<span id="jumlah-tampil">${data.rekap.length}</span> siswa)`;
  }

  function renderTabel(data) {
    const body = document.getElementById('tabel-body');
    document.getElementById('jumlah-tampil').textContent = data.length;

    if (data.length === 0) {
      body.innerHTML = `<tr><td colspan="5">
        <div class="empty"><div class="big">📭</div><p>Belum ada absensi</p></div>
      </td></tr>`;
      return;
    }

    body.innerHTML = data.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${r.nama}</strong></td>
        <td><span class="kelas-badge">${r.kelas}</span></td>
        <td>${r.no_absen}</td>
        <td><span class="time-pill">${r.waktu}</span></td>
      </tr>
    `).join('');
  }

  function filterTabel() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = semuaRekap.filter(r =>
      r.nama.toLowerCase().includes(q) ||
      r.kelas.toLowerCase().includes(q) ||
      r.no_absen.includes(q)
    );
    renderTabel(filtered);
  }

  // Auto refresh setiap 30 detik
  loadData();
  setInterval(loadData, 30000);
</script>
</body>
</html>
